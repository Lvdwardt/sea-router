name: Build, Regen & Deploy

on:
  workflow_dispatch:
    inputs:
      regen_graph:
        description: 'Force routing-graph regeneration before build'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'rust/**'
      - 'Dockerfile'
      - 'viewer.html'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lvdwardt/sea-router

jobs:
  # Decide whether the routing graph must be regenerated. The graph is a pure
  # function of the land data + the graph-shaping source; runtime-only changes
  # (router/server/los) reuse the existing pre-built graph from the release.
  detect:
    runs-on: ubuntu-latest
    outputs:
      regen: ${{ steps.decide.outputs.regen }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect graph-shaping changes
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            graph:
              - 'rust/src/generate.rs'
              - 'rust/src/graph_builder.rs'
              - 'rust/src/land.rs'
              - 'rust/src/canals.rs'

      - name: Decide
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.regen_graph }}" = "true" ]; then
            echo "regen=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.graph }}" = "true" ]; then
            echo "regen=true" >> "$GITHUB_OUTPUT"
          else
            echo "regen=false" >> "$GITHUB_OUTPUT"
          fi

  # Conditional: regenerate the graph (builds the binary from this ref, so it
  # picks up graph-shaping changes) and upload it to the graph-depth-16 release.
  regen:
    needs: detect
    if: ${{ needs.detect.outputs.regen == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/generate-graph.yml
    with:
      depth: '16'
    secrets: inherit

  build-and-push:
    needs: [detect, regen]
    # Run after detect always, and after regen unless it actually failed. When
    # regen is skipped (runtime-only change) we build with the existing graph.
    if: ${{ always() && needs.detect.result == 'success' && (needs.regen.result == 'success' || needs.regen.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pre-built data from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/graph
          gh release download "graph-depth-16" \
            --repo ${{ github.repository }} \
            --pattern "sea-graph.json.gz" \
            --pattern "osm_land_simplified.geojson.json.gz" \
            --dir data
          gunzip data/sea-graph.json.gz
          mv data/sea-graph.json data/graph/sea-graph.json
          gunzip data/osm_land_simplified.geojson.json.gz
          echo "Graph: $(du -sh data/graph/sea-graph.json | cut -f1)"
          echo "Land data: $(du -sh data/osm_land_simplified.geojson.json | cut -f1)"

      - name: Build and push
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker build \
            --tag "${TAG}:latest" \
            --tag "${TAG}:${{ github.sha }}" \
            .
          docker push "${TAG}:latest"
          docker push "${TAG}:${{ github.sha }}"

  # Trigger Coolify to pull the new :latest image and redeploy.
  deploy:
    needs: build-and-push
    # always() is required: when regen is skipped (runtime-only change), the
    # skip would otherwise propagate transitively through build-and-push to
    # here and silently skip the deploy.
    if: ${{ always() && needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify redeploy
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_KEY }}" \
            "https://coolify.cruisello.com/api/v1/deploy?uuid=kwkwswo4oc0cscws0cgsoccg&force=false"

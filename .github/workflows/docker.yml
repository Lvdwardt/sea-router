name: Build & Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rust/**'
      - 'Dockerfile'
      - 'viewer.html'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lvdwardt/sea-router

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download pre-built graph from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/graph
          gh release download "graph-depth-16" \
            --repo ${{ github.repository }} \
            --pattern "sea-graph.json.gz" \
            --dir data/graph
          gunzip data/graph/sea-graph.json.gz
          echo "Graph ready: $(du -sh data/graph/sea-graph.json | cut -f1)"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass the pre-built graph into the build context
          build-args: |
            PREBUILT_GRAPH=data/graph/sea-graph.json
